<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>채원나은이네 가계부</title>

<style>
body {
  font-family: "Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background: linear-gradient(180deg,#fffafb 0%,#fdf6f8 100%);
  margin:0;
  padding:20px;
  color:#2f2a2c;
}

h1 {text-align:center;margin-bottom:20px;font-weight:800;color:#5c4650;}

.card {
  background:#fff;
  border:1px solid #f3e4ea;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}

.row{display:flex;gap:10px;flex-wrap:wrap}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#fff;
}

.primary-btn{
  background:#ffe4ed;
  font-weight:700;
}

.mode-btn.active{
  background:#ffd6e5;
  font-weight:800;
}

input,select{
  width:100%;
  padding:10px;
  border:1px solid #eadbe1;
  border-radius:10px;
}

.top-summary-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.top-summary-card{
  border:1px solid #f3e4ea;
  border-radius:14px;
  padding:16px;
  text-align:center;
}

.label{font-size:13px;color:#8d7a82}
.value{font-size:22px;font-weight:800}

.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.summary-strong{font-size:20px;font-weight:800}

.red-text{color:#d25b63;font-weight:800}
.blue-text{color:#5b7fd2;font-weight:800}

@media(max-width:900px){
.top-summary-grid,
.detail-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<h1>🌷채원나은이네 가계부</h1>

<div class="card">
<div class="row">
<button id="recordModeBtn" class="mode-btn active" onclick="setMode('record')">기록용</button>
<button id="settlementModeBtn" class="mode-btn" onclick="setMode('settlement')">정산</button>
</div>
</div>

<div class="card">
<h3>월 선택</h3>
<div class="row">
<input id="monthPicker" type="month"/>
<button class="primary-btn" onclick="applySelectedMonth()">불러오기</button>
</div>
</div>

<div id="recordSection">

<div class="top-summary-grid">

<div class="top-summary-card">
<div class="label">총수입</div>
<div id="totalIncome" class="value">₩0</div>
</div>

<div class="top-summary-card">
<div class="label">총지출</div>
<div id="totalExpense" class="value">₩0</div>
</div>

<div class="top-summary-card">
<div class="label">고정지출 합계</div>
<div id="fixedExpenseTotalCard" class="value">₩0</div>
<div id="fixedExpenseBreakdown"></div>
</div>

<div class="top-summary-card">
<div class="label">남은금액</div>
<div id="remainingMoney" class="value">₩0</div>
</div>

<div class="top-summary-card">
<div class="label">다음달 카드예상</div>
<div id="nextCardExpense" class="value">₩0</div>
</div>

</div>

<div class="detail-grid">

<div class="card">
<h3>카드지출</h3>
<strong id="cardExpense" class="summary-strong">₩0</strong>
<div id="cardPersonTotal"></div>
</div>

<div class="card">
<h3>현금/이체지출</h3>
<strong id="cashExpense" class="summary-strong">₩0</strong>
<div id="cashPersonTotal"></div>
</div>

<div class="card">
<h3>결제자별</h3>
<div id="personSummary"></div>
</div>

</div>

<div class="card">
<h3>지출목록</h3>
<div id="expenseList"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>

const SUPABASE_URL = "https://kxdafjemyjwurpjlxmaf.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ht7JYGv9e2Q7CEjnlc5oHw_nsLVZ_wq";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentMode="record";

function formatMoney(v){
return "₩ "+Number(v||0).toLocaleString();
}

function getSelectedMonthRange(){
const val=document.getElementById("monthPicker").value;
const [y,m]=val.split("-");
const start=new Date(y,m-1,1);
const end=new Date(y,m,1);

return{
startString:start.toISOString().split("T")[0],
endString:end.toISOString().split("T")[0]
}
}

function updateRemaining(){
const income=document.getElementById("totalIncome").innerText.replace(/[₩,]/g,"");
const expense=document.getElementById("totalExpense").innerText.replace(/[₩,]/g,"");
document.getElementById("remainingMoney").innerText=formatMoney(income-expense);
}

function setMode(mode){
currentMode=mode;

document.getElementById("recordSection").style.display=(mode==="record")?"block":"none";
}

async function loadIncome(){
const {startString,endString}=getSelectedMonthRange();

const {data}=await supabaseClient
.from("income")
.select("*")
.gte("date",startString)
.lt("date",endString);

let total=0;

(data||[]).forEach(i=>{
total+=Number(i.amount||0)
})

document.getElementById("totalIncome").innerText=formatMoney(total);
updateRemaining();
}


    async function loadExpenses(){
const {startString,endString}=getSelectedMonthRange();

const {data,error}=await supabaseClient
.from("expenses")
.select("*")
.gte("date",startString)
.lt("date",endString)
.order("date",{ascending:false})
.order("id",{ascending:false});

if(error){
document.getElementById("expenseList").innerHTML="불러오기 실패";
return;
}

let totalExpense=0;

let fixedCard=0;
let fixedCash=0;
let normalCard=0;
let normalCash=0;

let nextCardExpense=0;

const payerBreakdown={
"훈카드":0,
"훈현금":0,
"쭈카드":0,
"쭈현금":0
};

let html="";

(data||[]).forEach(item=>{
const amt=Number(item.amount||0);
const payment=item.payment_method||"현금";
const payerType=item.payer_type||"";
const isFixed=item.fixed_expense_id!==null && item.fixed_expense_id!==undefined;

totalExpense+=amt;

if(payment==="카드"){
nextCardExpense+=amt;

if(isFixed) fixedCard+=amt;
else normalCard+=amt;
}else{
if(isFixed) fixedCash+=amt;
else normalCash+=amt;
}

if(payerBreakdown[payerType]!==undefined){
payerBreakdown[payerType]+=amt;
}

html+=`
<div style="padding:10px 0;border-bottom:1px solid #f2e7eb;">
  <div style="display:flex;justify-content:space-between;gap:10px;">
    <strong>${amt.toLocaleString()}원</strong>
    <span>${isFixed ? "[고정]" : "[일반]"}</span>
  </div>
  <div style="font-size:13px;color:#7d6c73;margin-top:6px;">
    ${item.date || "-"} / ${payment}${payment==="카드" ? " / "+(item.card_name || "기타카드") : ""} / ${payerType || "-"} / ${item.memo || ""}
  </div>
</div>
`;
});

const fixedTotal=fixedCard+fixedCash;
const cardTotal=fixedCard+normalCard;
const cashTotal=fixedCash+normalCash;

document.getElementById("expenseList").innerHTML=html || "저장된 내역이 없습니다.";
document.getElementById("totalExpense").innerText=formatMoney(totalExpense);

document.getElementById("fixedExpenseTotalCard").innerText=formatMoney(fixedTotal);
document.getElementById("fixedExpenseBreakdown").innerHTML=
`고정 카드 ${formatMoney(fixedCard)}<br>고정 현금·이체 ${formatMoney(fixedCash)}`;

document.getElementById("cardExpense").innerText=formatMoney(cardTotal);
document.getElementById("cashExpense").innerText=formatMoney(cashTotal);

document.getElementById("cardPersonTotal").innerHTML=
`고정 카드 ${formatMoney(fixedCard)}<br>일반 카드 ${formatMoney(normalCard)}`;

document.getElementById("cashPersonTotal").innerHTML=
`고정 현금·이체 ${formatMoney(fixedCash)}<br>일반 현금·이체 ${formatMoney(normalCash)}`;

document.getElementById("personSummary").innerHTML=`
<div style="padding:6px 0;">훈 카드결제: ${formatMoney(payerBreakdown["훈카드"])}</div>
<div style="padding:6px 0;">훈 현금/이체: ${formatMoney(payerBreakdown["훈현금"])}</div>
<div style="padding:6px 0;">쭈 카드결제: ${formatMoney(payerBreakdown["쭈카드"])}</div>
<div style="padding:6px 0;">쭈 현금/이체: ${formatMoney(payerBreakdown["쭈현금"])}</div>
`;

document.getElementById("nextCardExpense").innerText=formatMoney(nextCardExpense);

updateRemaining();
}

async function applySelectedMonth(){
await loadIncome();
await loadExpenses();
}

function getCurrentMonthValue(){
const now=new Date();
const y=now.getFullYear();
const m=String(now.getMonth()+1).padStart(2,"0");
return `${y}-${m}`;
}

async function init(){
document.getElementById("monthPicker").value=getCurrentMonthValue();
setMode("record");
await applySelectedMonth();
}

init();

</script>
</body>
</html>

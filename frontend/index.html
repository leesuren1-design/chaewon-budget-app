<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채원나은이네 가계부</title>

<style>
body{
  font-family:sans-serif;
  background:#f6f2f4;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  border-radius:12px;
  padding:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

.menu{
  margin-top:30px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

button{
  padding:20px;
  border:none;
  border-radius:12px;
  background:white;
  font-size:16px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  cursor:pointer;
}

input, select{
  width:100%;
  padding:12px;
  font-size:16px;
  border:1px solid #ddd;
  border-radius:10px;
  box-sizing:border-box;
}
</style>

</head>

<body>

<h1>채원나은이네 가계부</h1>

<div class="dashboard">
  <div class="card">
    총 수입<br>
    <strong>₩ 0</strong>
  </div>

  <div class="card">
  총 지출<br>
  <strong id="totalExpense">₩ 0</strong>
</div>

  <div class="card">
  <h3>저장된 지출 내역</h3>
  <div id="expenseList">불러오는 중...</div>
</div>

  <div class="card">
    남은 금액<br>
    <strong>₩ 0</strong>
  </div>

  <div class="card">
    다음달 카드 결제<br>
    <strong>₩ 0</strong>
  </div>
</div>

<div class="card">
  <h3>지출 입력</h3>

  <input id="amount" placeholder="금액" /><br><br>

  <select id="payment">
    <option value="카드">카드</option>
    <option value="현금">현금</option>
  </select><br><br>

  <select id="person">
    <option value="훈">훈</option>
    <option value="쭈">쭈</option>
    <option value="채원">채원</option>
    <option value="나은">나은</option>
    <option value="기타">기타</option>
  </select><br><br>

  <input id="memo" placeholder="메모" /><br><br>

  <button onclick="saveExpense()">저장</button>
</div>

<div class="menu">
  <button>지출 입력</button>
  <button>수입 입력</button>
  <button>카드 관리</button>
  <button>사람별 지출</button>
  <button>자동이체 달력</button>
  <button>레시피</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://kxdafjemyjwurpjlxmaf.supabase.co"
const SUPABASE_KEY = "sb_publishable_Ht7JYGv9e2Q7CEjnlc5oHw_nsLVZ_wq"

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function loadExpenses() {
  const { data, error } = await supabaseClient
    .from("expenses")
    .select("*")
    .order("id", { ascending: false })

  if (error) {
    document.getElementById("expenseList").innerHTML = "불러오기 실패"
    return
  }

  if (!data || data.length === 0) {
    document.getElementById("expenseList").innerHTML = "저장된 내역이 없습니다."
    document.getElementById("totalExpense").innerText = "₩ 0"
    return
  }

  let total = 0
  let html = ""

  data.forEach(item => {
    total += Number(item.amount || 0)

    html += `
      <div style="padding:10px 0; border-bottom:1px solid #eee;">
        <div><strong>${Number(item.amount).toLocaleString()}원</strong></div>
        <div style="font-size:14px; color:#666;">
          ${item.payment_method || "-"} / ${item.person || "-"} / ${item.memo || ""}
        </div>
      </div>
    `
  })

  document.getElementById("expenseList").innerHTML = html
  document.getElementById("totalExpense").innerText = "₩ " + total.toLocaleString()
}

async function saveExpense() {
  const amount = document.getElementById("amount").value
  const payment = document.getElementById("payment").value
  const person = document.getElementById("person").value
  const memo = document.getElementById("memo").value

  if (!amount) {
    alert("금액을 입력하세요")
    return
  }

  const { error } = await supabaseClient
    .from("expenses")
    .insert([
      {
        amount: Number(amount),
        payment_method: payment,
        person: person,
        memo: memo
      }
    ])

  if (error) {
    alert("저장 실패: " + error.message)
  } else {
    alert("저장 완료")
    document.getElementById("amount").value = ""
    document.getElementById("memo").value = ""
    loadExpenses()
  }
}

loadExpenses()
</script>
</body>
</html>
